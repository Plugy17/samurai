<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spirit Runner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="hud">
        <div class="stat-box">
            <div class="stat-label">Score</div>
            <div id="score" class="stat-value">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Combo</div>
            <div id="combo" class="stat-value">x0</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div class="tap-zone" onpointerdown="handleInput(0)">
            <span>◀</span><div class="tap-label">ЛЕВО</div>
        </div>
        <div class="tap-zone" onpointerdown="handleInput(1)">
            <span>⚪</span><div class="tap-label">ЦЕНТР</div>
        </div>
        <div class="tap-zone" onpointerdown="handleInput(2)">
            <span>▶</span><div class="tap-label">ПРАВО</div>
        </div>
    </div>

    <div id="menu">
        <div class="menu-item">🛒<br>МАГАЗИН</div>
        <div class="menu-item">🎒<br>ИНВЕНТАРЬ</div>
        <div class="menu-item">📜<br>КВЕСТЫ</div>
        <div class="menu-item">🏆<br>РЕЙТИНГ</div>
    </div>

    <script src="game.js"></script>
</body>
</html>
