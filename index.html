<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spirit Runner</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="hud">
        <div class="stat-box">
            <div class="stat-label">Score</div>
            <div id="score" class="stat-value">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Combo</div>
            <div id="combo" class="stat-value">x0</div>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="menu">
        <div class="menu-item">🛒<br>SHOP</div>
        <div class="menu-item">🎒<br>INV</div>
        <div class="menu-item">📜<br>QUEST</div>
        <div class="menu-item">🏆<br>RANK</div>
    </div>

    <script>
        // Инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран телефона
        tg.ready();
    </script>
    <script src="game.js"></script>
</body>
</html>
